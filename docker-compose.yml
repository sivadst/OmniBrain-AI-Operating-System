version: '3.8'

services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/omnibrain
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333

  worker:
    build: .
    command: arq worker.WorkerSettings
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - api
      - postgres
      - redis
      - qdrant
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/omnibrain
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnibrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omnibrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  mcp_sqlite:
    image: python:3.10-slim
    command: sh -c "pip install mcp-server-sqlite && mcp-server-sqlite --db-path /data/db.sqlite3"
    volumes:
      - sqlite_data:/data
    
  mcp_filesystem:
    image: python:3.10-slim
    command: sh -c "pip install mcp-server-filesystem && mcp-server-filesystem /data"
    volumes:
      - mcp_fs_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  sqlite_data:
  mcp_fs_data:
